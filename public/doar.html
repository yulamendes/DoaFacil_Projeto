  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/doar.css">
</head>

  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2e7d32;">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="img/logodoafacil.png" alt="DoaFácil" width="180">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="sobre.html">Sobre</a>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">Cadastro</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="login.html">Entre na sua conta</a></li>

            <a class="nav-link" href="contato.html">Contato</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <section class="form-container">
      <h2>Registrar Doação</h2>
      <form action="http://localhost:8090/add-doacao" method="POST">

        <label for="nome_doador">Nome do Doador</label>
        <input type="text" id="nome_doador" name="nome_doador" placeholder="Ex: João Silva" required>

        <label for="telefone_doador">Telefone do Doador</label>
        <input type="tel" id="telefone_doador" name="telefone_doador" placeholder="Ex: (81) 99999-9999" required>

        <label for="email_Doador">Email do Doador</label>
        <input type="email" id="email_Doador" name="email_Doador" placeholder="Ex: joao@email.com" required>

        <label for="nome_alimento">Nome do Alimento</label>
        <input type="text" id="nome_alimento" name="nome_alimento" placeholder="Ex: Arroz, Feijão..." required>

        <label for="kg_Alimento">Quantidade de Alimento (kg)</label>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="number" id="kg_Alimento" name="kg_Alimento" min="1" placeholder="Ex: 10" required
            oninput="document.getElementById('kg_label').style.display = this.value ? 'inline' : 'none'">
          <span id="kg_label" style="display: none; font-weight: bold;">kg</span>
        </div>

        <button type="submit">Cadastrar Doação</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 DoaFácil - Plataforma de Doação de Alimentos</p>
  </footer>
